<!DOCTYPE html>
<html>
<head>
    <title>Roof Tracker Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; display: flex; font-family: sans-serif; background: #000; }
        #sidebar { width: 300px; background: #1a1a1a; color: white; padding: 20px; z-index: 1000; box-shadow: 2px 0 10px #000; }
        #map { flex-grow: 1; height: 100%; background: #222; }
        .stat-box { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #00d4ff; }
        h2 { color: #00d4ff; margin-top: 0; }
        button { width: 100%; background: #00d4ff; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0099bb; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Roof Trace v1.0</h2>
        <div class="stat-box">
            <div>Points Placed</div>
            <div id="count" style="font-size: 1.5rem; font-weight: bold;">0</div>
        </div>
        <p style="font-size: 0.8rem; color: #aaa;">Click on the map to start tracing. Zoom in deep to see roof details.</p>
        <button onclick="location.reload()">Reset Map</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Start Map
        var map = L.map('map').setView([37.7749, -122.4194], 18);
        function goToAddress(lat, lng) {
        map.setView([lat, lng], 19);

        // Satellite Layer
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri'
        }).addTo(map);

        var points = [];
        var polyline = L.polyline([], {color: '#00d4ff', weight: 4}).addTo(map);

        map.on('click', function(e) {
            points.push(e.latlng);
            L.circleMarker(e.latlng, { radius: 5, color: '#fff', fillColor: '#00d4ff', fillOpacity: 1 }).addTo(map);
            polyline.setLatLngs(points);
            document.getElementById('count').innerText = points.length;
        });
    </script>
</body>
</html>
